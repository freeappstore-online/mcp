name = "freeappstore-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
API_BASE = "https://api.freeappstore.online"
GITHUB_ORG = "freeappstore-online"
AGENT_BASE = "https://agent.freeappstore.online"

[[routes]]
pattern = "mcp.freeappstore.online/*"
zone_name = "freeappstore.online"

# Secrets (set via `wrangler secret put`):
#   SESSION_SIGNING_KEY — HMAC key for session verification + OAuth

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "89a54092cb7d41329234dbbb693324ac"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "FasMcpAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FasMcpAgent"]
